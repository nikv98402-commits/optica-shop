name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_TALLY_FORM_URL: ${{ vars.VITE_TALLY_FORM_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Add static route entries for GitHub Pages
        run: |
          routes=(
            tryon
            eye-check
            eyecheck
            vision-check
            vision-tracker
            visiontracker
            products
            product
            dashboard
            checkout
            face-fit-score
            kak-vybrat-razmer-opravy
            pd-i-oprava
            oprava-pri-vysokih-dioptriyah
            primerit-ochki-online
            podbor-opravy-po-forme-lica
            vision-care
            vision-access
            impact
            access
            ai-source
            privacy
            terms
            disclaimer
          )
          for route in "${routes[@]}"; do
            mkdir -p "dist/$route"
            cp dist/index.html "dist/$route/index.html"
          done
          cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
